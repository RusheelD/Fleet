name: Build and deploy Fleet to Azure Web App - fleet-ai-dev

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Fleet.Server/**"
      - ".github/workflows/main_fleet-ai-dev.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fleet-ai-dev
  NODE_VERSION: "20"
  DOTNET_VERSION: "10.0.x"
  FRONTEND_DIR: ./frontend
  BACKEND_PROJECT: ./Fleet.Server/Fleet.Server.csproj
  BACKEND_WWWROOT: ./Fleet.Server/wwwroot
  PUBLISH_DIR: ./publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Recreate backend wwwroot
        run: |
          rm -rf "${{ env.BACKEND_WWWROOT }}"
          mkdir -p "${{ env.BACKEND_WWWROOT }}"
          cp -R "${{ env.FRONTEND_DIR }}/dist/." "${{ env.BACKEND_WWWROOT }}/"

      - name: Verify frontend copied into backend wwwroot
        run: |
          echo "== frontend/dist =="
          ls -la "${{ env.FRONTEND_DIR }}/dist"
          find "${{ env.FRONTEND_DIR }}/dist" -maxdepth 3 -type f | sort

          echo "== Fleet.Server/wwwroot =="
          ls -la "${{ env.BACKEND_WWWROOT }}"
          find "${{ env.BACKEND_WWWROOT }}" -maxdepth 3 -type f | sort

          test -f "${{ env.BACKEND_WWWROOT }}/index.html"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend dependencies
        run: dotnet restore "${{ env.BACKEND_PROJECT }}"

      - name: Publish backend
        run: dotnet publish "${{ env.BACKEND_PROJECT }}" --configuration Release --no-restore --output "${{ env.PUBLISH_DIR }}"

      - name: Verify published output
        run: |
          echo "== publish root =="
          ls -la "${{ env.PUBLISH_DIR }}"
          find "${{ env.PUBLISH_DIR }}" -maxdepth 2 -type f | sort

          echo "== publish wwwroot =="
          ls -la "${{ env.PUBLISH_DIR }}/wwwroot"
          find "${{ env.PUBLISH_DIR }}/wwwroot" -maxdepth 3 -type f | sort

          test -f "${{ env.PUBLISH_DIR }}/wwwroot/index.html"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: ${{ env.PUBLISH_DIR }}
