name: Build and deploy Fleet container to Azure Web App - fleet-ai-dev

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Fleet.Server/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/main_fleet-ai-dev.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fleet-ai-dev
  AZURE_RESOURCE_GROUP: fleet-dev_group
  IMAGE_NAME: fleet-ai-dev
  REPO_SANDBOX_ROOT: /tmp/fleet-sandboxes
  GIT_EXECUTABLE_PATH: /usr/bin/git
  WEBSITES_PORT: "8080"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build Fleet image
        shell: bash
        run: |
          docker build \
            --tag "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --tag "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push Fleet image
        shell: bash
        run: |
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Configure Azure Web App container
        shell: bash
        run: |
          az webapp config container set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --container-registry-url "https://${{ secrets.AZURE_ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.AZURE_ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.AZURE_ACR_PASSWORD }}"

      - name: Configure Azure Web App settings
        shell: bash
        run: |
          az webapp config appsettings set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --settings \
              WEBSITES_PORT=${{ env.WEBSITES_PORT }} \
              GIT_EXECUTABLE_PATH=${{ env.GIT_EXECUTABLE_PATH }} \
              REPO_SANDBOX_ROOT=${{ env.REPO_SANDBOX_ROOT }}

      - name: Restart Azure Web App
        shell: bash
        run: |
          az webapp restart \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}"
