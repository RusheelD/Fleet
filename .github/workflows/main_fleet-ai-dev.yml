name: Build and publish Fleet container image - fleet-ai-dev

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Fleet.Server/**"
      - "Fleet.Server.Tests/**"
      - "Dockerfile"
      - ".dockerignore"
      - "Fleet.slnx"
      - ".github/workflows/main_fleet-ai-dev.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: fleet-ai-dev
  IMAGE_TAG: ${{ github.sha }}
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 20.x
  PUBLISH_DIR: publish

jobs:
  build-test-publish-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_ENTRA_CLIENT_ID: ${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_AUTHORITY: ${{ secrets.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_API_SCOPE: ${{ secrets.VITE_ENTRA_API_SCOPE }}
          VITE_ENTRA_REDIRECT_URI: https://app.fleet-ai.dev/
          VITE_ENTRA_KNOWN_AUTHORITIES: ${{ secrets.VITE_ENTRA_KNOWN_AUTHORITIES }}
          VITE_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
        run: npm run build

      - name: Restore .NET dependencies
        run: dotnet restore Fleet.Server.Tests/Fleet.Server.Tests.csproj

      - name: Build Fleet.Server
        run: dotnet build Fleet.Server/Fleet.Server.csproj -c Release --no-restore

      - name: Build Fleet.Server.Tests
        run: dotnet build Fleet.Server.Tests/Fleet.Server.Tests.csproj -c Release --no-restore

      - name: Run .NET tests
        run: dotnet test Fleet.Server.Tests/Fleet.Server.Tests.csproj -c Release --no-build

      - name: Publish Fleet application
        shell: bash
        run: |
          rm -rf "${{ env.PUBLISH_DIR }}"
          dotnet publish Fleet.Server/Fleet.Server.csproj \
            -c Release \
            -o "${{ env.PUBLISH_DIR }}" \
            --no-build \
            /p:UseAppHost=false
          mkdir -p "${{ env.PUBLISH_DIR }}/wwwroot"
          cp -R frontend/dist/. "${{ env.PUBLISH_DIR }}/wwwroot/"

      - name: Validate container registry secrets
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
        run: |
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "ACR_LOGIN_SERVER secret is required." >&2
            exit 1
          fi

          if [[ "$ACR_LOGIN_SERVER" != *.* ]]; then
            echo "ACR_LOGIN_SERVER must be a registry host such as 'example.azurecr.io'." >&2
            exit 1
          fi

          if [ -z "$ACR_USERNAME" ]; then
            echo "ACR_USERNAME secret is required for docker registry login." >&2
            exit 1
          fi

          if [ -n "$ACR_REGISTRY" ]; then
            echo "Using ACR registry '$ACR_REGISTRY' at '$ACR_LOGIN_SERVER'."
          else
            echo "Using ACR login server '$ACR_LOGIN_SERVER'."
          fi

      - name: Resolve ACR password
        id: acr-password
        shell: bash
        env:
          ACR_PASSWORD1: ${{ secrets.ACR_PASSWORD1 }}
          ACR_PASSWORD2: ${{ secrets.ACR_PASSWORD2 }}
        run: |
          if [ -n "$ACR_PASSWORD1" ]; then
            echo "::add-mask::$ACR_PASSWORD1"
            {
              echo "value<<EOF"
              echo "$ACR_PASSWORD1"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [ -n "$ACR_PASSWORD2" ]; then
            echo "::add-mask::$ACR_PASSWORD2"
            {
              echo "value<<EOF"
              echo "$ACR_PASSWORD2"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "Neither ACR_PASSWORD1 nor ACR_PASSWORD2 is configured." >&2
            exit 1
          fi

      - name: Debug container registry connectivity
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          echo "Docker version:"
          docker version
          echo
          echo "Container registry debug:"
          echo "  Registry name: ${ACR_REGISTRY:-<unset>}"
          echo "  Login server: $ACR_LOGIN_SERVER"
          echo
          echo "DNS lookup:"
          getent hosts "$ACR_LOGIN_SERVER" || nslookup "$ACR_LOGIN_SERVER" || true
          echo
          echo "HTTPS probe to registry /v2/:"
          probe_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' --max-time 20 "https://$ACR_LOGIN_SERVER/v2/" || true)"
          echo "  HTTP status: ${probe_status:-curl_failed}"

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ steps.acr-password.outputs.value }}

      - name: Show image tags
        shell: bash
        run: |
          echo "Commit tag: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Latest tag: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Build Fleet image
        shell: bash
        run: |
          docker build \
            --pull \
            --tag "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --tag "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push Fleet image
        shell: bash
        run: |
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Verify image was pushed to registry
        shell: bash
        run: |
          image_ref="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          if ! docker manifest inspect "$image_ref" > /dev/null; then
            echo "Image '$image_ref' was not found in the registry after push." >&2
            exit 1
          fi

          echo "Confirmed pushed image '$image_ref' in the registry."
