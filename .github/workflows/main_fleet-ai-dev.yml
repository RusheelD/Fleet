name: Build and deploy Fleet container to Azure Web App - fleet-ai-dev

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Fleet.Server/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/main_fleet-ai-dev.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fleet-ai-dev
  IMAGE_NAME: fleet-ai-dev
  IMAGE_TAG: ${{ github.sha }}
  REPO_SANDBOX_ROOT: /tmp/fleet-sandboxes
  GIT_EXECUTABLE_PATH: /usr/bin/git
  WEBSITES_PORT: "8080"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AAF77799CFC646B596227A77F28AADFA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BEB8E833354143C98782FEC2A188D874 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Validate target App Service
        shell: bash
        run: |
          is_linux="$(az webapp show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "reserved" \
            -o tsv)"

          if [ "$is_linux" != "true" ]; then
            echo "App Service '${{ env.AZURE_WEBAPP_NAME }}' must be a Linux web app for custom container deployment." >&2
            exit 1
          fi

      - name: Validate container registry secrets
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
        run: |
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "ACR_LOGIN_SERVER secret is required." >&2
            exit 1
          fi

          if [[ "$ACR_LOGIN_SERVER" != *.* ]]; then
            echo "ACR_LOGIN_SERVER must be a registry host such as 'example.azurecr.io'." >&2
            exit 1
          fi

          if [ -z "$ACR_USERNAME" ]; then
            echo "ACR_USERNAME secret is required for docker registry login." >&2
            exit 1
          fi

          if [ -n "$ACR_REGISTRY" ]; then
            echo "Using ACR registry '$ACR_REGISTRY' at '$ACR_LOGIN_SERVER'."
          else
            echo "Using ACR login server '$ACR_LOGIN_SERVER'."
          fi

      - name: Resolve ACR password
        id: acr-password
        shell: bash
        env:
          ACR_PASSWORD1: ${{ secrets.ACR_PASSWORD1 }}
          ACR_PASSWORD2: ${{ secrets.ACR_PASSWORD2 }}
        run: |
          if [ -n "$ACR_PASSWORD1" ]; then
            echo "::add-mask::$ACR_PASSWORD1"
            {
              echo "value<<EOF"
              echo "$ACR_PASSWORD1"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [ -n "$ACR_PASSWORD2" ]; then
            echo "::add-mask::$ACR_PASSWORD2"
            {
              echo "value<<EOF"
              echo "$ACR_PASSWORD2"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "Neither ACR_PASSWORD1 nor ACR_PASSWORD2 is configured." >&2
            exit 1
          fi

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ steps.acr-password.outputs.value }}

      - name: Build Fleet image
        shell: bash
        run: |
          docker build \
            --pull \
            --build-arg VITE_ENTRA_CLIENT_ID="${{ secrets.VITE_ENTRA_CLIENT_ID }}" \
            --build-arg VITE_ENTRA_AUTHORITY="${{ secrets.VITE_ENTRA_AUTHORITY }}" \
            --build-arg VITE_ENTRA_API_SCOPE="${{ secrets.VITE_ENTRA_API_SCOPE }}" \
            --build-arg VITE_ENTRA_KNOWN_AUTHORITIES="${{ secrets.VITE_ENTRA_KNOWN_AUTHORITIES }}" \
            --build-arg VITE_ENVIRONMENT="${{ secrets.VITE_ENVIRONMENT }}" \
            --tag "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --tag "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push Fleet image
        shell: bash
        run: |
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

      - name: Verify image was pushed to registry
        shell: bash
        run: |
          image_ref="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          if ! docker manifest inspect "$image_ref" > /dev/null; then
            echo "Image '$image_ref' was not found in the registry after push." >&2
            exit 1
          fi

          echo "Confirmed pushed image '$image_ref' in the registry."

      - name: Configure Azure Web App container
        shell: bash
        run: |
          az webapp config container set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --container-registry-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ steps.acr-password.outputs.value }}"

      - name: Show configured Azure Web App container
        shell: bash
        run: |
          az webapp config container show \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"

      - name: Configure Azure Web App settings
        shell: bash
        run: |
          az webapp config appsettings set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings \
              "WEBSITES_PORT=${{ env.WEBSITES_PORT }}" \
              "GIT_EXECUTABLE_PATH=${{ env.GIT_EXECUTABLE_PATH }}" \
              "REPO_SANDBOX_ROOT=${{ env.REPO_SANDBOX_ROOT }}" \
              "AZUREAD__INSTANCE=${{ secrets.AZUREAD__INSTANCE }}" \
              "AZUREAD__TENANTID=${{ secrets.AZUREAD__TENANTID }}" \
              "AZUREAD__CLIENTID=${{ secrets.AZUREAD__CLIENTID }}" \
              "AZUREAD__AUDIENCE=${{ secrets.AZUREAD__AUDIENCE }}"

      - name: Restart Azure Web App
        shell: bash
        run: |
          az webapp restart \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"

      - name: Wait for deployed app health
        shell: bash
        run: |
          health_url="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error "$health_url" > /dev/null; then
              echo "Fleet is healthy at $health_url"
              exit 0
            fi

            echo "Waiting for Fleet to become healthy (attempt $attempt/20)..."
            sleep 15
          done

          echo "Fleet did not become healthy after deployment. Check App Service log stream for container startup details." >&2
          exit 1
