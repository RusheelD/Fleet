name: Build and deploy Fleet to Azure Web App - fleet-ai-dev

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Fleet.Server/**"
      - ".github/workflows/main_fleet-ai-dev.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fleet-ai-dev
  NODE_VERSION: "20"
  DOTNET_VERSION: "10.0.x"
  FRONTEND_DIR: ./frontend
  BACKEND_PROJECT: ./Fleet.Server/Fleet.Server.csproj
  PUBLISH_DIR: ./publish
  DEPLOY_ZIP: ./fleet-ai-dev.zip

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment runtime config from GitHub Secrets
        shell: bash
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_MODEL: ${{ secrets.AZURE_OPENAI_MODEL }}
          AZURE_OPENAI_GENERATE_MODEL: ${{ secrets.AZURE_OPENAI_GENERATE_MODEL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_GENERATE_MODEL: ${{ secrets.LLM_GENERATE_MODEL }}
          FLEETDB_CONNECTION_STRING: ${{ secrets.FLEETDB_CONNECTION_STRING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_CONNECTION_STRING: ${{ secrets.REDIS_CONNECTION_STRING }}
          FLEET_REDIS_CONNECTION_STRING: ${{ secrets.FLEET_REDIS_CONNECTION_STRING }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def pick(*keys):
              for key in keys:
                  value = os.getenv(key)
                  if value and value.strip():
                      return value.strip()
              return None

          config = {}

          github_client_id = pick("GITHUB_CLIENT_ID", "GITHUB_OAUTH_CLIENT_ID")
          github_client_secret = pick("GITHUB_CLIENT_SECRET", "GITHUB_OAUTH_CLIENT_SECRET")
          if github_client_id or github_client_secret:
              config["GitHub"] = {}
              if github_client_id:
                  config["GitHub"]["ClientId"] = github_client_id
              if github_client_secret:
                  config["GitHub"]["ClientSecret"] = github_client_secret

          llm_api_key = pick("AZURE_OPENAI_API_KEY")
          llm_endpoint = pick("AZURE_OPENAI_ENDPOINT")
          llm_model = pick("AZURE_OPENAI_MODEL", "LLM_MODEL")
          llm_generate_model = pick("AZURE_OPENAI_GENERATE_MODEL", "LLM_GENERATE_MODEL")
          if llm_api_key or llm_endpoint or llm_model or llm_generate_model:
              config["LLM"] = {}
              if llm_api_key:
                  config["LLM"]["ApiKey"] = llm_api_key
              if llm_endpoint:
                  config["LLM"]["Endpoint"] = llm_endpoint
              if llm_model:
                  config["LLM"]["Model"] = llm_model
              if llm_generate_model:
                  config["LLM"]["GenerateModel"] = llm_generate_model

          fleetdb_connection = pick("FLEETDB_CONNECTION_STRING", "DATABASE_URL")
          redis_connection = pick("FLEET_REDIS_CONNECTION_STRING", "REDIS_CONNECTION_STRING")
          if fleetdb_connection or redis_connection:
              config["ConnectionStrings"] = {}
              if fleetdb_connection:
                  config["ConnectionStrings"]["fleetdb"] = fleetdb_connection
              if redis_connection:
                  config["ConnectionStrings"]["cache"] = redis_connection

          output = Path("Fleet.Server/appsettings.Deployment.json")
          if config:
              output.write_text(json.dumps(config, indent=2) + "\n", encoding="utf-8")
              print(f"Generated {output} with sections: {', '.join(sorted(config.keys()))}")
          else:
              print("No deployment secrets were provided via GitHub Secrets; skipping appsettings.Deployment.json generation.")
          PY

      - name: Validate runtime secret coverage
        shell: bash
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}
        run: |
          github_client_id="${GITHUB_CLIENT_ID:-$GITHUB_OAUTH_CLIENT_ID}"
          github_client_secret="${GITHUB_CLIENT_SECRET:-$GITHUB_OAUTH_CLIENT_SECRET}"

          if [ -z "$github_client_id" ] || [ -z "$github_client_secret" ]; then
            echo "::warning::GitHub OAuth secrets are missing in GitHub Actions secrets. Production GitHub linking may fail until these are configured."
          else
            echo "GitHub OAuth secrets are present."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Verify frontend dist
        shell: bash
        run: |
          ls -la "${{ env.FRONTEND_DIR }}/dist"
          find "${{ env.FRONTEND_DIR }}/dist" -maxdepth 3 -type f | sort
          test -f "${{ env.FRONTEND_DIR }}/dist/index.html"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend dependencies
        run: dotnet restore "${{ env.BACKEND_PROJECT }}"

      - name: Publish backend
        run: dotnet publish "${{ env.BACKEND_PROJECT }}" --configuration Release --no-restore --output "${{ env.PUBLISH_DIR }}"

      - name: Remove temporary deployment config from workspace
        if: always()
        run: rm -f Fleet.Server/appsettings.Deployment.json

      - name: Copy frontend into published app
        shell: bash
        run: |
          rm -rf "${{ env.PUBLISH_DIR }}/wwwroot"
          mkdir -p "${{ env.PUBLISH_DIR }}/wwwroot"
          cp -R "${{ env.FRONTEND_DIR }}/dist/." "${{ env.PUBLISH_DIR }}/wwwroot/"

      - name: Remove test artifacts from publish output
        shell: bash
        run: |
          find "${{ env.PUBLISH_DIR }}" -maxdepth 1 \( -name "*Tests*" -o -name "testhost*" -o -name "*.trx" \) -print -delete || true

      - name: Verify final published app
        shell: bash
        run: |
          echo "== publish root =="
          ls -la "${{ env.PUBLISH_DIR }}"
          find "${{ env.PUBLISH_DIR }}" -maxdepth 1 -type f | sort

          echo "== publish wwwroot =="
          ls -la "${{ env.PUBLISH_DIR }}/wwwroot"
          find "${{ env.PUBLISH_DIR }}/wwwroot" -maxdepth 3 -type f | sort

          test -f "${{ env.PUBLISH_DIR }}/Fleet.Server.dll"
          test -f "${{ env.PUBLISH_DIR }}/Fleet.Server.runtimeconfig.json"
          test ! -f "${{ env.PUBLISH_DIR }}/Fleet.Server.Tests.runtimeconfig.json"
          test -f "${{ env.PUBLISH_DIR }}/wwwroot/index.html"
          if test -f "${{ env.PUBLISH_DIR }}/appsettings.Deployment.json"; then
            echo "Runtime deployment override file included."
          else
            echo "Runtime deployment override file not included (no deployment secrets file generated)."
          fi

      - name: Create deployment zip
        shell: bash
        run: |
          cd "${{ env.PUBLISH_DIR }}"
          zip -r "${{ github.workspace }}/fleet-ai-dev.zip" .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.DEPLOY_ZIP }}
