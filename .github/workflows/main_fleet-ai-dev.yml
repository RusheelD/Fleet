name: Build and deploy Fleet to Azure Web App - fleet-ai-dev

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "Fleet.Server/**"
      - ".github/workflows/main_fleet-ai-dev.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: fleet-ai-dev
  NODE_VERSION: "20"
  DOTNET_VERSION: "10.0.x"
  FRONTEND_DIR: ./frontend
  BACKEND_PROJECT: ./Fleet.Server/Fleet.Server.csproj
  PUBLISH_DIR: ./publish
  DEPLOY_ZIP: ./fleet-ai-dev.zip

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Verify frontend dist
        shell: bash
        run: |
          ls -la "${{ env.FRONTEND_DIR }}/dist"
          find "${{ env.FRONTEND_DIR }}/dist" -maxdepth 3 -type f | sort
          test -f "${{ env.FRONTEND_DIR }}/dist/index.html"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend dependencies
        run: dotnet restore "${{ env.BACKEND_PROJECT }}"

      - name: Publish backend
        run: dotnet publish "${{ env.BACKEND_PROJECT }}" --configuration Release --no-restore --output "${{ env.PUBLISH_DIR }}"

      - name: Copy frontend into published app
        shell: bash
        run: |
          rm -rf "${{ env.PUBLISH_DIR }}/wwwroot"
          mkdir -p "${{ env.PUBLISH_DIR }}/wwwroot"
          cp -R "${{ env.FRONTEND_DIR }}/dist/." "${{ env.PUBLISH_DIR }}/wwwroot/"

      - name: Remove test artifacts from publish output
        shell: bash
        run: |
          find "${{ env.PUBLISH_DIR }}" -maxdepth 1 \( -name "*Tests*" -o -name "testhost*" -o -name "*.trx" \) -print -delete || true

      - name: Verify final published app
        shell: bash
        run: |
          echo "== publish root =="
          ls -la "${{ env.PUBLISH_DIR }}"
          find "${{ env.PUBLISH_DIR }}" -maxdepth 1 -type f | sort

          echo "== publish wwwroot =="
          ls -la "${{ env.PUBLISH_DIR }}/wwwroot"
          find "${{ env.PUBLISH_DIR }}/wwwroot" -maxdepth 3 -type f | sort

          test -f "${{ env.PUBLISH_DIR }}/Fleet.Server.dll"
          test -f "${{ env.PUBLISH_DIR }}/Fleet.Server.runtimeconfig.json"
          test ! -f "${{ env.PUBLISH_DIR }}/Fleet.Server.Tests.runtimeconfig.json"
          test -f "${{ env.PUBLISH_DIR }}/wwwroot/index.html"

      - name: Create deployment zip
        shell: bash
        run: |
          cd "${{ env.PUBLISH_DIR }}"
          zip -r "${{ github.workspace }}/fleet-ai-dev.zip" .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.DEPLOY_ZIP }}
